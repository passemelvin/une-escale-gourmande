<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Ovale extérieur double -->
  <ellipse cx="100" cy="110" rx="85" ry="100" stroke="#1a1a1a" stroke-width="3.5" fill="none"/>
  <ellipse cx="100" cy="110" rx="79" ry="94" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Maison (trait dessiné à la main) -->
  <path d="M82 88 L100 68 L118 88" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="84" y="88" width="32" height="24" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="93" y="100" width="14" height="12" stroke="#1a1a1a" stroke-width="1.8" fill="none"/>
  <!-- Ligne séparatrice -->
  <line x1="65" y1="122" x2="135" y2="122" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Truffe (ovale avec texture pointillée) -->
  <ellipse cx="100" cy="142" rx="22" ry="14" stroke="#1a1a1a" stroke-width="2.2" fill="#1a1a1a" fill-opacity="0.08"/>
  <ellipse cx="100" cy="142" rx="22" ry="14" stroke="#1a1a1a" stroke-width="2.2" fill="none"/>
  <circle cx="93" cy="139" r="1.5" fill="#1a1a1a"/>
  <circle cx="100" cy="137" r="1.5" fill="#1a1a1a"/>
  <circle cx="107" cy="139" r="1.5" fill="#1a1a1a"/>
  <circle cx="96" cy="144" r="1.5" fill="#1a1a1a"/>
  <circle cx="104" cy="144" r="1.5" fill="#1a1a1a"/>
  <circle cx="100" cy="148" r="1.5" fill="#1a1a1a"/>
  <!-- Texte -->
  <text x="100" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1a1a1a" letter-spacing="0.5">Une Escale Gourmande</text>
</svg>
