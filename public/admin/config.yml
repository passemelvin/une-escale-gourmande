backend:
  name: git-gateway
  branch: main

locale: fr
media_folder: public/images
public_folder: /images

collections:
  - name: "pages"
    label: "Pages du site"
    files:

      - name: "accueil"
        label: "Page Accueil"
        file: "src/data/accueil.json"
        fields:
          - { label: "Titre hero", name: "hero_titre", widget: "string" }
          - { label: "Sous-titre hero", name: "hero_sous_titre", widget: "string" }
          - { label: "Texte introduction", name: "intro_texte", widget: "text" }

      - name: "chambre"
        label: "Page Chambre d'hôte"
        file: "src/data/chambre.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Tarif nuit (2 personnes)", name: "tarif_nuit", widget: "number", default: 66 }
          - { label: "Tarif dîner (par personne)", name: "tarif_diner", widget: "number", default: 19 }
          - { label: "Photo principale", name: "photo", widget: "image" }

      - name: "traiteur"
        label: "Page Traiteur"
        file: "src/data/traiteur.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Capacité maximum", name: "capacite", widget: "number", default: 120 }
          - { label: "Zone d'intervention", name: "zone", widget: "string" }

      - name: "truffe"
        label: "Page Menu Truffe"
        file: "src/data/truffe.json"
        fields:
          - { label: "Titre", name: "titre", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Saison", name: "saison", widget: "string", default: "Décembre à fin février" }
          - { label: "Photo principale", name: "photo", widget: "image" }

      - name: "contact"
        label: "Informations de contact"
        file: "src/data/contact.json"
        fields:
          - { label: "Téléphone", name: "telephone", widget: "string", default: "06 25 14 26 08" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Adresse", name: "adresse", widget: "string" }
          - { label: "Ville", name: "ville", widget: "string" }
